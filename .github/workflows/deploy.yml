name: Deploy to EC2

on:
  repository_dispatch:
    types:
      - deploy-auth-service
      - deploy-user-service
      - deploy-commentary-service
      - deploy-recommendation-service
      - deploy-publication-service
      - deploy-payment-service
      - deploy-identity-verification-service
      - deploy-proxy-service
      - deploy-registry-service
      - deploy-config-service
      - deploy-messagebroker-service

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout infrastructure repo
        uses: actions/checkout@v4

      - name: Deploy with SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            SERVICE_TYPE=${{ github.event.action }}

            cd /home/ubuntu

            # Si le dossier n'existe pas, on clone
            if [ ! -d "infrastructure" ]; then
              git clone https://github.com/DREAMHOUSE-237/infrastructure.git
            fi

            cd infrastructure

            # Si le dossier existe mais n'est pas un repo Git valide, on le supprime et on reclone
            if [ ! -d ".git" ]; then
              cd ..
              rm -rf infrastructure
              git clone https://github.com/DREAMHOUSE-237/infrastructure.git
              cd infrastructure
            fi

            # Mise à jour forcée sur la branche main
            git fetch origin main
            git reset --hard origin/main

            # Injection des variables sensibles depuis GitHub Secrets
            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            export DB_URL_AUTH=${{ secrets.DB_URL_AUTH }}
            export DB_URL_USER=${{ secrets.DB_URL_USER }}
            export DB_URL_COMMENTARY=${{ secrets.DB_URL_COMMENTARY }}
            export DB_URL_RECOMMENDATION=${{ secrets.DB_URL_RECOMMENDATION }}
            export DB_URL_PUBLICATION=${{ secrets.DB_URL_PUBLICATION }}
            export DB_URL_PAYMENT=${{ secrets.DB_URL_PAYMENT }}
            export DB_URL_IDENTITY=${{ secrets.DB_URL_IDENTITY }}

            # Déploiement ciblé
            echo "🚀 Déploiement du service ${SERVICE_TYPE}..."
            docker compose -f docker-compose.prod.yml pull ${SERVICE_TYPE#deploy-}
            docker compose -f docker-compose.prod.yml up -d ${SERVICE_TYPE#deploy-}
            docker ps

            # Health check dynamique
            echo "Vérification de la santé du service ${SERVICE_TYPE}..."
            RETRIES=5
            DELAY=10
            SUCCESS=false

            PORT=8081
            if [ "$SERVICE_TYPE" = "deploy-user-service" ]; then PORT=8082; fi
            if [ "$SERVICE_TYPE" = "deploy-commentary-service" ]; then PORT=8083; fi
            if [ "$SERVICE_TYPE" = "deploy-recommendation-service" ]; then PORT=8084; fi
            if [ "$SERVICE_TYPE" = "deploy-publication-service" ]; then PORT=8085; fi
            if [ "$SERVICE_TYPE" = "deploy-payment-service" ]; then PORT=8086; fi
            if [ "$SERVICE_TYPE" = "deploy-identity-verification-service" ]; then PORT=8087; fi
            if [ "$SERVICE_TYPE" = "deploy-proxy-service" ]; then PORT=8080; fi
            if [ "$SERVICE_TYPE" = "deploy-registry-service" ]; then PORT=8761; fi
            if [ "$SERVICE_TYPE" = "deploy-config-service" ]; then PORT=8888; fi
            if [ "$SERVICE_TYPE" = "deploy-messagebroker-service" ]; then PORT=15672; fi

            for i in $(seq 1 $RETRIES); do
              echo "Tentative $i/$RETRIES..."
              if curl -fs http://localhost:$PORT/health; then
                echo "✅ Service ${SERVICE_TYPE} opérationnel"
                SUCCESS=true
                break
              else
                echo "⏳ Service pas encore prêt, nouvelle tentative dans $DELAY secondes..."
                sleep $DELAY
              fi
            done

            if [ "$SUCCESS" = false ]; then
              echo "❌ Service ${SERVICE_TYPE} non disponible après $RETRIES tentatives"
              exit 1
            fi
