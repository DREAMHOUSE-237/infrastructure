name: Deploy to EC2

on:
  repository_dispatch:
    types: [deploy-auth-service]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout infrastructure repo
        uses: actions/checkout@v4

      - name: Deploy with SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu

            # Si le dossier n'existe pas, on clone
            if [ ! -d "infrastructure" ]; then
              git clone https://github.com/DREAMHOUSE-237/infrastructure.git
            fi

            cd infrastructure

            # Si le dossier existe mais n'est pas un repo Git valide, on le supprime et on reclone
            if [ ! -d ".git" ]; then
              cd ..
              rm -rf infrastructure
              git clone https://github.com/DREAMHOUSE-237/infrastructure.git
              cd infrastructure
            fi

            # Mise à jour forcée sur la branche main
            git fetch origin main
            git reset --hard origin/main

            # Injection de la variable Docker Hub depuis les secrets GitHub
            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}

            # Déploiement avec Docker Compose
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker ps

            # Health check robuste
            echo "Vérification de la santé du service..."
            RETRIES=5
            DELAY=10
            SUCCESS=false

            for i in $(seq 1 $RETRIES); do
              echo "Tentative $i/$RETRIES..."
              if curl -fs http://localhost:8081/health; then
                echo "✅ Service opérationnel"
                SUCCESS=true
                break
              else
                echo "⏳ Service pas encore prêt, nouvelle tentative dans $DELAY secondes..."
                sleep $DELAY
              fi
            done

            if [ "$SUCCESS" = false ]; then
              echo "❌ Service non disponible après $RETRIES tentatives"
              exit 1
            fi

